version: '3.8'

services:
  nexus-app:
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=sqlite:nexus.db
      - ENVIRONMENT=production
    volumes:
      - ./data:/app/data
    restart: unless-stopped

